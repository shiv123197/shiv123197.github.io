<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - Golden Electronics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
}

/* Header */
header {
  background-color: #f44336;
  padding: 10px;
  text-align: center;
  font-size: 30px;
  color: white;
}

/* Navigation */
nav {
  float: left;
  width: 30%;
  height: 300px;
  background: #ccc;
  padding: 20px;
}

nav ul {
  list-style-type: none;
  padding: 0;
}

nav ul li {
  margin: 15px 0;
}

nav ul li a {
  display: block;
  background-color: #f44336;
  color: white;
  padding: 12px;
  text-decoration: none;
  border-radius: 5px;
  text-align: center;
}

nav ul li a:hover {
  background-color: red;
}

/* Main Content */
article {
  float: left;
  padding: 20px;
  width: 70%;
  background-color: #f1f1f1;
  height: 300px;
}

/* Table Styling */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background-color: #f44336;
  color: white;
}

td, th {
  border: 1px solid #ddd;
  padding: 10px;
}

tr:nth-child(even) {
  background-color: #f9f9f9;
}

/* Clear floats */
section::after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
footer {
  background-color: #777;
  padding: 10px;
  text-align: center;
  color: white;
}

/* Responsive */
@media (max-width: 600px) {
  nav, article {
    width: 100%;
    height: auto;
  }
}
</style>
</head>

<body>

<header>

</header>

<section>

    </ul>
  </nav>
