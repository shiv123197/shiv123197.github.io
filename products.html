<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }

        h2 {
            margin-top: 20px;
        }

        .nav a {
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .item img {
            width: 300px;
            border-radius: 10px;
        }

        .price {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <h2>Golden Electronics</h2>

    <div class="nav">
        <a href="about.html" target="_blank">About Us</a>
        <a href="products.html" target="_blank">Gallery</a>
        <a href="contact.html" target="_blank">Contact</a>
        <a href="form.html"  target="_blank">Form</a>
    </div>

    <h2>Our Gallery</h2>

    <div class="gallery">
        <div class="item">
            <img src="Digital.jpg" alt="Weighing Machine 1">
            <div class="price">₹2,500</div>
        </div>

        <div class="item">
            <img src="6176dMNN8nL.jpg" alt="Weighing Machine 2">
            <div class="price">₹6,500</div>
        </div>

        <div class="item">
            <img src="golden electronics system.jpg" alt="Golden Electronics System">
            <div class="price">3,000</div>
        </div>

        <div class="item">
            <img src="golden electronics machines.jpg" alt="Golden Electronics Machines">
            <div class="price">₹4,000</div>
        </div>
    </div>

</body>
</html>
