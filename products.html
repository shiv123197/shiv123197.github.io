<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Golden Electronics</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f1f1f1;
        }

        /* Header */
        header {
            background-color: #f44336;
            padding: 10px;
            text-align: center;
            font-size: 30px;
            color: white;
        }

        /* Navigation */
        .nav {
            background-color: #ccc;
            padding: 15px;
            text-align: center;
        }

        .nav a {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            text-decoration: none;
            color: white;
            background-color: #f44336;
            border-radius: 5px;
        }

        .nav a:hover {
            background-color: red;
        }

        h2 {
            margin-top: 20px;
            text-align: center;
        }

        /* Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px;
        }

        .item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .item img {
            width: 300px;
            border-radius: 10px;
        }

        .price {
            margin-top: 10px;
            font-weight: bold;
            color: #f44336; /* changed to match theme */
        }

        /* Footer */
        footer {
            background-color: #777;
            padding: 10px;
            text-align: center;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h2>Golden Electronics</h2>
</header>

<div class="nav">
    <a href="about.html" target="_blank">About Us</a>
    <a href="products.html" target="_blank">Gallery</a>
    <a href="contact.html" target="_blank">Contact</a>
    <a href="form.html" target="_blank">Form</a>
</div>

<h2>Our Gallery</h2>

<div class="gallery">
    <div class="item">
        <img src="Digital.jpg" alt="Weighing Machine 1">
        <div class="price">₹2,500</div>
    </div>

    <div class="item">
        <img src="6176dMNN8nL.jpg" alt="Weighing Machine 2">
        <div class="price">₹6,500</div>
    </div>

    <div class="item">
        <img src="golden electronics system.jpg" alt="Golden Electronics System">
        <div class="price">₹3,000</div>
    </div>

    <div class="item">
        <img src="golden electronics machines.jpg" alt="Golden Electronics Machines">
        <div class="price">₹4,000</div>
    </div>
</div>

<footer>
    <p>© 2026 Golden Electronics</p>
</footer>

</body>
</html>
