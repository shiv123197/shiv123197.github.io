<!DOCTYPE html>
<html lang="en">
<head>
<title>Golden Electronics</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* Header */
header {
  background-color: #f44336;
  padding: 2px;
  text-align: center;
  font-size: 35px;
  color: white;
}

/* Navigation */
nav {
  float: left;
  width: 30%;
  height: 300px;
  background: #ccc;
  padding: 20px;
}

nav ul {
  list-style-type: none;
  padding: 0;
}

nav ul li {
  margin: 15px 0;
}

nav ul li a {
  display: block;
  background-color: #f44336;
  color: white;
  padding: 12px;
  text-decoration: none;
  border-radius: 5px;
  text-align: center;
}

nav ul li a:hover {
  background-color: red;
}

/* Article (main content) */
article {
  float: left;
  padding: 20px;
  width: 70%;
  background-color: #f1f1f1;
  height: 300px;
}

/* Clear floats */
section::after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
footer {
  background-color: #777;
  padding: 10px;
  text-align: center;
  color: white;
}

/* Responsive */
@media (max-width: 600px) {
  nav, article {
    width: 100%;
    height: auto;
  }
}
</style>
</head>

<body>

<header>
  <h2>Golden Electronics</h2>
</header>

<section>
  <nav>
    <ul>
      <li><a href="aboutus.html" target="_blank">About Us</a></li>
      <li><a href="products.html" target="_blank">Products</a></li>
      <li><a href="contact.html" target="_blank">Contact</a></li>
      <li><a href="form.html"  target="_blank">Form</a></li>
    </ul>
  </nav>

  <article>
    <h1>Welcome</h1>
    <p>Welcome to Golden Electronics. We provide quality electronic products and services.</p>
    <p>Use the navigation menu to explore more about us, view our products, or get in touch.</p>
  </article>
</section>

<footer>
  <p>© 2026 Golden Electronics</p>
</footer>

</body>
</html>
