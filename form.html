<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form - Golden Electronics</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
}

/* Header */
header {
  background-color: #f44336;
  padding: 10px;
  text-align: center;
  font-size: 30px;
  color: white;
}

/* Navigation */
nav {
  float: left;
  width: 30%;
  background: #ccc;
  padding: 20px;
  min-height: 100vh;
}

nav ul {
  list-style-type: none;
  padding: 0;
}

nav ul li {
  margin: 15px 0;
}

nav ul li a {
  display: block;
  background-color: #f44336;
  color: white;
  padding: 12px;
  text-decoration: none;
  border-radius: 5px;
  text-align: center;
}

nav ul li a:hover {
  background-color: red;
}

/* Main Content */
article {
  float: left;
  width: 70%;
  padding: 20px;
  background-color: #f1f1f1;
}

/* Form Box */
.container {
  background-color: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
  max-width: 400px;
  margin: auto;
}

h2 {
  text-align: center;
}

/* Inputs */
input {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

input[type="submit"] {
  cursor: pointer;
  background-color: #f44336;
  color: white;
  border: none;
}

input[type="submit"]:hover {
  background-color: red;
}

/* Footer */
footer {
  background-color: #777;
  padding: 10px;
  text-align: center;
  color: white;
  clear: both;
}

/* Responsive */
@media (max-width: 600px) {
  nav, article {
    width: 100%;
  }
}
</style>
</head>

<body>

<header>
  <h2>Golden Electronics</h2>
</header>

<section>
  <nav>
    <ul>
      <li><a href="about.html" target="_blank">About Us</a></li>
      <li><a href="products.html" target="_blank">Products</a></li>
      <li><a href="contact.html" target="_blank">Contact</a></li>
      <li><a href="form.html" target="_blank">Form</a></li>
    </ul>
  </nav>

  <article>
    <div class="container">
      <h2>Contact Form</h2>

      <form>
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="Shiv"><br>

        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Dalia"><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="shiv@gmail.com"><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="8766332887"><br><br>

        <input type="submit" value="Submit">
      </form>
    </div>
  </article>
</section>

<footer>
  <p>© 2026 Golden Electronics</p>
</footer>

</body>
</html>
